name: Auto-Sync Intervals.icu Data

on:
  schedule:
    # Daily at 03:00 UTC (07:00 Tbilisi)
    - cron: '0 3 * * *'
  workflow_dispatch:  # Allow manual trigger

permissions:
  contents: write
  issues: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests

      - name: Verify scripts/sync.py exists
        run: |
          if [ ! -f scripts/sync.py ]; then
            echo "❌ ERROR: scripts/sync.py not found in repository!"
            echo "Files in current directory:"
            ls -la
            exit 1
          fi
          echo "✅ scripts/sync.py found"
          echo "File size: $(wc -c < scripts/sync.py) bytes"

      - name: Verify secrets are set
        run: |
          if [ -z "${{ secrets.ATHLETE_ID }}" ]; then
            echo "❌ ERROR: ATHLETE_ID secret not set!"
            exit 1
          fi
          if [ -z "${{ secrets.INTERVALS_KEY }}" ]; then
            echo "❌ ERROR: INTERVALS_KEY secret not set!"
            exit 1
          fi
          echo "✅ All secrets configured"

      - name: Run sync
        env:
          ATHLETE_ID: ${{ secrets.ATHLETE_ID }}
          INTERVALS_KEY: ${{ secrets.INTERVALS_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPO: ${{ github.repository }}
          WEEK_START: ${{ secrets.WEEK_START }}
          ZONE_PREFERENCE: ${{ secrets.ZONE_PREFERENCE }}
        run: |
          echo "🔍 Debug info:"
          echo "  Python version: $(python --version)"
          echo "  Working directory: $(pwd)"
          echo "  ATHLETE_ID: ${ATHLETE_ID:0:5}..."
          echo "  GITHUB_REPO: $GITHUB_REPO"
          echo ""
          echo "🚀 Running sync script..."
          python scripts/sync.py \
            --athlete-id "$ATHLETE_ID" \
            --intervals-key "$INTERVALS_KEY" \
            --github-token "$GITHUB_TOKEN" \
            --github-repo "$GITHUB_REPO" \
            --days 7 || {
              echo "❌ Sync script failed with exit code $?"
              exit 1
            }

      - name: Verify data/latest.json was created/updated
        run: |
          if [ -f data/latest.json ]; then
            echo "✅ data/latest.json exists"
            echo "File size: $(wc -c < data/latest.json) bytes"
            echo "Last modified: $(stat -c %y data/latest.json 2>/dev/null || stat -f %Sm data/latest.json)"
          else
            echo "⚠️ data/latest.json not found - might be no changes detected"
          fi

      - name: Commit updated data
        if: success()
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

          for f in data/latest.json data/history.json data/intervals.json data/ftp_history.json; do
            if [ -f "$f" ]; then
              git add "$f"
            fi
          done

          git pull --rebase --autostash origin main

          if ! git diff --staged --quiet; then
            git commit -m "Update training data - $(date -u +"%Y-%m-%d %H:%M:%S UTC")"
            git push
            echo "✅ Data committed and pushed"
          else
            echo "⏭️  No changes to commit"
          fi

      - name: Update README with last sync time
        if: success()
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          SYNC_TIME=$(date -u +"%Y-%m-%d %H:%M:%S UTC")

          if [ -f README.md ]; then
            echo "Current README content (first 5 lines):"
            head -5 README.md

            if grep -q "Last successful sync:" README.md; then
              echo "Found existing timestamp line, updating..."
              sed -i "s/\*\*Last successful sync:\*\*.*/\*\*Last successful sync:\*\* ${SYNC_TIME}/" README.md
            else
              echo "No timestamp found, adding new line..."
              sed -i "/badge.svg)/a\\\n\*\*Last successful sync:\*\* ${SYNC_TIME}\n" README.md
            fi

            echo "Updated README content (first 5 lines):"
            head -5 README.md

            if ! git diff --quiet README.md; then
              git add README.md
              git commit -m "Update last sync timestamp: ${SYNC_TIME}"
              git push
              echo "✅ README updated with sync time: ${SYNC_TIME}"
            else
              echo "⚠️ No changes detected in README"
            fi
          fi

      - name: Show result
        run: |
          echo "✅ Sync completed successfully!"
          echo "📊 View data: https://raw.githubusercontent.com/${{ github.repository }}/main/data/latest.json"

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::⚠️ Sync failed! Check the logs above for details."
          echo "Common issues:"
          echo "  - Check ATHLETE_ID and INTERVALS_KEY secrets"
          echo "  - Verify Intervals.icu API is accessible"
          echo "  - Check GitHub token permissions"
